spring.application.name=lacr-loan-closure-reconciliation
server.port=${SERVER_PORT:8012}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lacr_loan_closure_reconciliation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/lacr_audit}
lacr.outbox.publish-delay-ms=${LACR_OUTBOX_PUBLISH_DELAY_MS:30000}
lacr.outbox.max-attempts=${LACR_OUTBOX_MAX_ATTEMPTS:3}
lacr.outbox.publisher.mode=${LACR_OUTBOX_PUBLISHER_MODE:log}
lacr.outbox.kafka.topic=${LACR_OUTBOX_KAFKA_TOPIC:loan-closure-events}
lacr.outbox.kafka.consumer.enabled=${LACR_OUTBOX_KAFKA_CONSUMER_ENABLED:false}
lacr.outbox.kafka.consumer.group-id=${LACR_OUTBOX_KAFKA_CONSUMER_GROUP_ID:lacr-closure-consumer}
lacr.outbox.kafka.consumer.dlq-topic=${LACR_OUTBOX_KAFKA_CONSUMER_DLQ_TOPIC:loan-closure-events.DLQ}
lacr.outbox.kafka.consumer.retry-backoff-ms=${LACR_OUTBOX_KAFKA_CONSUMER_RETRY_BACKOFF_MS:1000}
lacr.outbox.kafka.consumer.max-retries=${LACR_OUTBOX_KAFKA_CONSUMER_MAX_RETRIES:2}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.security.allowed-origin-patterns=${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}
app.security.operators.closureops.password=${APP_SECURITY_CLOSUREOPS_PASSWORD}
app.security.operators.reconlead.password=${APP_SECURITY_RECONLEAD_PASSWORD}
app.security.operators.auditor.password=${APP_SECURITY_AUDITOR_PASSWORD}
app.security.operators.opsadmin.password=${APP_SECURITY_OPSADMIN_PASSWORD}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
