spring.application.name=lacr-loan-closure-reconciliation
server.port=${SERVER_PORT:8012}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lacr_loan_closure_reconciliation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/lacr_audit}
lacr.outbox.publish-delay-ms=${LACR_OUTBOX_PUBLISH_DELAY_MS:30000}
lacr.outbox.max-attempts=${LACR_OUTBOX_MAX_ATTEMPTS:3}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
