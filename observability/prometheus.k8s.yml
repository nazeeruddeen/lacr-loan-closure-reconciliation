global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: lacr-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - lacr-backend.lacr-loan.svc.cluster.local:8012
        labels:
          app: lacr-backend
          environment: kubernetes
          namespace: lacr-loan
