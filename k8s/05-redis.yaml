# Integration-only single-node Redis manifest.
# Production should point the application at a managed HA Redis endpoint through ExternalSecret-backed settings.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacr-redis
  namespace: lacr-loan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lacr-redis
  template:
    metadata:
      labels:
        app: lacr-redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lacr-redis
  namespace: lacr-loan
spec:
  selector:
    app: lacr-redis
  ports:
    - port: 6379
      targetPort: 6379
