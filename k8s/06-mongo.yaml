# Integration-only single-node Mongo manifest.
# Production should point the application at a managed HA MongoDB endpoint through ExternalSecret-backed settings.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lacr-mongo
  namespace: lacr-loan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lacr-mongo
  template:
    metadata:
      labels:
        app: lacr-mongo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lacr-mongo
  namespace: lacr-loan
spec:
  selector:
    app: lacr-mongo
  ports:
    - port: 27017
      targetPort: 27017
