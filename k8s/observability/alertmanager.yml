global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.gmail.com:587
  smtp_from: nazeershaik.ai@gmail.com
  smtp_auth_username: nazeershaik.ai@gmail.com
  smtp_auth_identity: nazeershaik.ai@gmail.com
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp-password

route:
  receiver: lacr-notifications
  group_by:
    - alertname
    - service
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: lacr-notifications
    webhook_configs:
      - url: http://lacr-alert-receiver.lacr-loan.svc.cluster.local:8080/
        send_resolved: true
    email_configs:
      - to: nazeershaik.ai@gmail.com
        send_resolved: true
        headers:
          subject: '[LACR] {{ .CommonLabels.alertname }}'
