groups:
  - name: lacr-domain
    rules:
      - alert: LacrOutboxFailuresPresent
        expr: lacr_outbox_status_count{status="failed"} > 0
        for: 10m
        labels:
          severity: critical
          service: lacr
        annotations:
          summary: LACR outbox has failed events
          description: One or more outbox events are stuck in FAILED for over 10 minutes.

      - alert: LacrStaleOutboxProcessingPresent
        expr: lacr_outbox_status_count{status="stale"} > 0
        for: 10m
        labels:
          severity: warning
          service: lacr
        annotations:
          summary: LACR stale outbox processing detected
          description: Outbox events have exceeded the reclaim window and need intervention.

      - alert: LacrMismatchedReconciliationsPresent
        expr: lacr_reconciliation_status_count{status="mismatched"} > 0
        for: 10m
        labels:
          severity: warning
          service: lacr
        annotations:
          summary: LACR mismatched reconciliations need review
          description: At least one closure reconciliation is currently mismatched for more than 10 minutes.

      - alert: LacrFailedEventsQueuePresent
        expr: lacr_failed_events_current_count > 0
        for: 10m
        labels:
          severity: warning
          service: lacr
        annotations:
          summary: LACR failed-event queue is non-empty
          description: Failed workflow events are present and should be investigated or replayed.

      - alert: LacrWorkflowLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{job="lacr-backend",uri=~"/api/v1/closure-requests.*|/api/v1/ops/.*"}[5m]))) > 1.5
        for: 15m
        labels:
          severity: warning
          service: lacr
        annotations:
          summary: LACR workflow latency is above the SLO
          description: The p95 latency for closure and ops endpoints has been above 1.5 seconds for 15 minutes.

      - alert: LacrWorkflowErrorRatioHigh
        expr: (sum(rate(http_server_requests_seconds_count{job="lacr-backend",uri=~"/api/v1/closure-requests.*|/api/v1/ops/.*",status=~"5.."}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{job="lacr-backend",uri=~"/api/v1/closure-requests.*|/api/v1/ops/.*"}[5m])), 0.001)) > 0.02
        for: 10m
        labels:
          severity: critical
          service: lacr
        annotations:
          summary: LACR workflow 5xx ratio is above the SLO
          description: Closure and ops endpoints have exceeded a 2% 5xx ratio for 10 minutes.
